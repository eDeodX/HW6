name: Build and Release Packages

on:
  push:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Configure CMake
        run: cmake -H. -B ${{ github.workspace }}/_build

      - name: build project
        run: cmake --build ${{ github.workspace }}/_build

      - name: build TGZ package
        run: cpack -G "TGZ" -B ${{ github.workspace }}/_build

      - name: build DEB package
        run: cpack -G "DEB" -B ${{ github.workspace }}/_build

      - name: build RPM package
        run: cpack -G "RPM" -B ${{ github.workspace }}/_build

      - name: upload packages to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ github.workspace }}/_build/*.tar.gz
            ${{ github.workspace }}/_build/*.deb
            ${{ github.workspace }}/_build/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -H. -B ${{ github.workspace }}/_build

      - name: build project
        run: cmake --build ${{ github.workspace }}/_build

      - name: build TGZ package
        run: cpack -G "TGZ" -B ${{ github.workspace }}/_build

      - name: build DMG package
        run: cpack -G "DragNdrop" -B ${{ github.workspace }}/_build

      - name: upload packages to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ github.workspace }}/_build/*.tar.gz
            ${{ github.workspace }}/_build/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install WIX
        run: choco install wixtoolset -y

      - name: Configure CMake
        run: cmake -S. -B ${{ github.workspace }}/_build

      - name: build project
        run: cmake --build ${{ github.workspace }}/_build --config Release

      - name: build ZIP package
        run: cpack -G "ZIP" -B ${{ github.workspace }}/_build -C Release

      - name: build MSI package
        run: cpack -G "WIX" -B ${{ github.workspace }}/_build -C Release

      - name: upload packages to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ github.workspace }}/_build/*.zip
            ${{ github.workspace }}/_build/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}